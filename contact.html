<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | AuroConnect</title>
    <style>
      :root {
        --accent: #0b57d0;
        --bg: #f8f9fa;
        --surface: #ffffff;
        --text: #1f1f1f;
        --text-secondary: #444444;
        --border: #ddd;
        --shadow: rgba(0, 0, 0, 0.05);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #000000;
          --surface: #1e1e1e;
          --text: #f1f3f4;
          --text-secondary: #bdc1c6;
          --border: #3c4043;
          --accent: #8ab4f8;
          --shadow: rgba(0, 0, 0, 0.5);
        }
      }

      html {
        font-size: 100%;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        align-items: center;
      }

      .container {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 2.5rem;
        margin-top: 3rem;
        margin-bottom: 3rem;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 4px 6px var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        box-sizing: border-box;
      }

      .container h2 {
        margin: 0;
        font-size: 1.5rem;
        text-align: center;
        color: var(--text);
      }

      .container p {
        color: var(--text-secondary);
        margin: -0.5rem 0 0.5rem 0;
        text-align: center;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        width: 100%;
      }

      .form-group label {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-secondary);
      }

      .form-group input, .form-group textarea {
        padding: 0.75rem 1rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text);
        outline: none;
        font-size: 0.95rem;
        font-family: inherit;
        transition: border-color 0.2s;
      }

      .form-group input:focus, .form-group textarea:focus {
        border-color: var(--accent);
      }

      .btn {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        border-radius: 2rem;
        cursor: pointer;
        font-weight: 600;
        width: 100%;
        transition: opacity 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }

      .btn:hover {
        opacity: 0.9;
      }

      @media (prefers-color-scheme: dark) {
        .btn {
          color: #000;
          background: var(--accent);
        }
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #status-message {
        font-size: 0.9rem;
        text-align: center;
        padding: 0.75rem;
        border-radius: 8px;
        display: none;
        line-height: 1.4;
      }

      #status-message.success {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
        color: #10b981;
        display: block;
      }

      #status-message.error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #ef4444;
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Injected header will go here via common.js -->

    <div class="container">
      <h2>📬 Contact AuroConnect</h2>
      <p>Have questions, feedback, or need support? Drop us a message below and our team will get back to you.</p>

      <form id="contact-form">
        <div class="form-group">
          <label for="contact-name">Your Name</label>
          <input type="text" id="contact-name" placeholder="John Doe" required />
        </div>

        <div class="form-group" style="margin-top: 1rem;">
          <label for="contact-email">Email Address</label>
          <input type="email" id="contact-email" placeholder="john@example.com" required />
        </div>

        <div class="form-group" style="margin-top: 1rem;">
          <label for="contact-phone">Mobile Number</label>
          <div style="display: flex; gap: 0.5rem;">
            <input type="text" id="contact-country-code" list="country-codes-list" value="+91" placeholder="+91" style="padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; font-size: 0.95rem; font-family: inherit; width: 110px;" required />
            <datalist id="country-codes-list">
              <option value="+91">India (+91)</option>
              <option value="+1">USA/Canada (+1)</option>
              <option value="+44">UK (+44)</option>
              <option value="+971">UAE (+971)</option>
              <option value="+33">France (+33)</option>
              <option value="+49">Germany (+49)</option>
              <option value="+61">Australia (+61)</option>
              <option value="+65">Singapore (+65)</option>
              <option value="+81">Japan (+81)</option>
              <option value="+7">Russia (+7)</option>
              <option value="+86">China (+86)</option>
            </datalist>
            <input type="tel" id="contact-phone" placeholder="9876543210" style="flex: 1;" required />
          </div>
        </div>

        <div class="form-group" style="margin-top: 1rem;">
          <label for="contact-subject">Subject</label>
          <input type="text" id="contact-subject" placeholder="Feedback/Event issue..." required />
        </div>

        <div class="form-group" style="margin-top: 1rem;">
          <label for="contact-message">Message</label>
          <textarea id="contact-message" rows="5" placeholder="Write your message here..." required></textarea>
        </div>

        <div id="status-message" style="margin-top: 1rem;"></div>

        <button type="submit" id="submit-btn" class="btn" style="margin-top: 1.5rem;">
          Send Message
        </button>
      </form>
    </div>

    <!-- Firebase SDKs and Firestore Submission Logic -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
      import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

      let firebaseConfig = {
        projectId: "gen-lang-client-0039539258",
        appId: "1:615927626963:web:af7cd31a3a9859919fe826",
        apiKey: "AIzaSyBE_i3Y6SXSfmFfZ_ptMclJT0GySmA0dlM",
        authDomain: "gen-lang-client-0039539258.firebaseapp.com",
        storageBucket: "gen-lang-client-0039539258.firebasestorage.app",
        messagingSenderId: "615927626963",
        firestoreDatabaseId: "ai-studio-64cdf999-24b6-49a7-bf7c-8606ad4d20d4"
      };

      try {
        const configRes = await fetch("/api/firebase_config");
        if (configRes.ok) {
          const fetchedConfig = await configRes.json();
          firebaseConfig = { ...firebaseConfig, ...fetchedConfig };
        }
      } catch (err) {
        console.warn("Could not load dynamic Firebase config, using defaults:", err);
      }

      const app = initializeApp(firebaseConfig);
      const db = (firebaseConfig.firestoreDatabaseId && firebaseConfig.firestoreDatabaseId !== "(default)")
        ? getFirestore(app, firebaseConfig.firestoreDatabaseId)
        : getFirestore(app);

      const contactForm = document.getElementById("contact-form");
      const submitBtn = document.getElementById("submit-btn");
      const statusMsg = document.getElementById("status-message");

      contactForm.onsubmit = async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = "Sending...";
        statusMsg.style.display = "none";
        statusMsg.className = "";

        const name = document.getElementById("contact-name").value.trim();
        const email = document.getElementById("contact-email").value.trim();
        const phone = document.getElementById("contact-country-code").value + " " + document.getElementById("contact-phone").value.trim();
        const subject = document.getElementById("contact-subject").value.trim();
        const message = document.getElementById("contact-message").value.trim();

        try {
          await addDoc(collection(db, "contact_messages"), {
            name,
            email,
            phone,
            subject,
            message,
            timestamp: serverTimestamp()
          });

          statusMsg.innerText = "Thank you! Your message has been sent successfully. We'll get back to you soon.";
          statusMsg.className = "success";
          contactForm.reset();
        } catch (err) {
          console.error("Firestore submission error:", err);
          statusMsg.innerText = "Failed to send message: " + err.message;
          statusMsg.className = "error";
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerText = "Send Message";
        }
      };
    </script>

    <!-- Injected header and footer script -->
    <script src="/common.js" type="module"></script>
  </body>
</html>
